name: 24/7 NSE High-Speed Monitor

on:
  schedule:
    - cron: '30 3 * * 1' # System automated kickstart every Monday morning at 9:00 AM IST
  workflow_dispatch: # Allows manual UI launch click

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-genai requests pandas

      - name: Run Active Engine Loop
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python monitor.py
