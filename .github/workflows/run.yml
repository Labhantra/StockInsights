name: High-Speed Exchange Relay Engine

on:
  workflow_dispatch: # Manual trigger from GitHub website/app, and the internal handover dispatch

# Ensures only ONE instance of this workflow ever runs at a time. If a new run is
# triggered (manual, or the handover dispatch) while another is still active, the
# older one is automatically cancelled instead of running in parallel and causing
# duplicate Telegram alerts.
concurrency:
  group: nse-monitor-singleton
  cancel-in-progress: true

jobs:
  monitor-stream:
    runs-on: ubuntu-latest

    # Prevents GitHub from cancelling the workflow early
    timeout-minutes: 360

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent run initializations

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests pypdf

      - name: Execute Monitor Script Loop
        env:
          # System Relay Secrets
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}

          # Isolated Multi-Key Multipliers for Free-Tier Rotation
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
        run: python monitor.py
