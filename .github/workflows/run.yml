name: 24/7 NSE High-Speed Monitor
on:
  schedule:
    - cron: '*/5 * * * *'  # Runs automatically every 5 minutes, 24/7
  workflow_dispatch:       # Allows you to click a button and test it manually

permissions:
  contents: write
  
jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests pandas google-genai

      - name: Execute Live Tracking Cycle
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          python monitor.py

      - name: Save Persistent History Cache Logs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "System sync: updated history logs [skip ci]"
          file_pattern: "processed_announcements.txt"
